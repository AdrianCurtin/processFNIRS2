[Info]
% --- Coordinate-system metadata for the 3D Pos3D fields ---
% MNI-space, millimetres. These are an idealized standard-head TEMPLATE montage
% (not per-subject digitized) - treat as a group prior, not subject anatomy.
% ReferenceHead is unspecified; verify it before any absolute-MNI or Talairach
% claim. The 2D Pos fields (DetPosX/SrcPosX ...) remain in centimetres.
CoordinateSystem       = 'MNI'
CoordinateUnits        = 'mm'
RegistrationMethod     = 'template'
CoordinateProvenance   = 'idealized-template'
ReferenceHead          = 'unspecified'
CfgName                = 'fNIR_Devices_fNIR1000_LD' % Should match filename
Name                   = 'Model 1000 LD' % Square patch, single detector at center, 4 sources at corners
Manufacturer           = 'fNIR Devices'
LightType              = 'LED'
Wireless               = 0
DefaultSamplingRate    = 2 	% Expected sampling rate in samples per second (hz)
MaxSamplingRate    = 4 	% Expected sampling rate in samples per second (hz)
NumberChannels = 4
NumberProbes = 1
TimeIsSampleCount = 0 	% Time is labeled as sample count or in seconds, 0 is false
RawMax = 4000	% Number which when raw data is exceeded, is considered saturated
RawMin = 0		% Number which when raw data is less than, is considered invalid

[Probe1]
ChannelNumbers    = [0,1,1,1,2,2,2,3,3,3,4,4,4]	%Must match full format of .raw field, 0 indicates time, NaN indicates unused column
Wavelength    = [NaN,730,0,850,730,0,850,730,0,850,730,0,850]	% wavelength in nm, 0 indicates dark or ambient channel,NaN indicates unused or time channel

% 2D layout: square patch, detector at center, sources at corners.
% Patch side ~3.54 cm; SD distance = 2.5 cm.
DetPosX	=	[1.76777];
DetPosY	=	[1.76777];
DetPosZ	=	[0];

SrcPosX	=	[0,3.53553,3.53553,0];
SrcPosY	=	[3.53553,3.53553,0,0];
SrcPosZ	=	[0,0,0,0];

% 3D placeholder positions (approximate prefrontal midline placement, MNI mm).
% Adjust per actual probe placement when known.
DetPos3DX	=	[0]
DetPos3DY	=	[75]
DetPos3DZ	=	[5]

SrcPos3DX	=	[-17.68,17.68,17.68,-17.68]
SrcPos3DY	=	[92.68,92.68,57.32,57.32]
SrcPos3DZ	=	[5,5,5,5]


sI=[1,2,3,4];
dI=[1,1,1,1];
