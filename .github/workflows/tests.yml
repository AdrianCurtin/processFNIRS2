name: tests

# Manual MATLAB validation (run on demand from the Actions tab, not on push/PR
# yet). Runs the fast "quick" lane plus the durable semantic-identity contracts.
# Both gates exit non-zero on any failure or incomplete test.
#
# To enable automatic runs later, add push/pull_request triggers under `on:`.
#
# Notes:
#  - matlab-actions/setup-matlab provisions MATLAB on GitHub-hosted runners.
#    Public repositories can run batch MATLAB without a license; private repos
#    need a MathWorks batch token exposed as the MLM_LICENSE_TOKEN secret
#    (add `env: MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}` below).
#  - To add a heavier lane (nightly), run the full gate:
#      pf2_base.tests.runCI('full')
#    in a separate scheduled workflow. The quick lane is kept fast on purpose.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick-tests:
    name: Quick lane (runCI('quick'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2025b
      - name: Run quick test lane
        uses: matlab-actions/run-command@v3
        with:
          command: "addpath(genpath('.')); pf2_base.tests.runCI('quick')"

  identity-contract:
    name: Identity (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # R2025b is the repository's currently documented recommended release.
          - label: R2025b / Linux
            os: ubuntu-latest
            release: R2025b
          # `latest` exercises current MATLAB on every supported runner family
          # without hard-coding a release that becomes stale each half-year.
          - label: latest / Linux
            os: ubuntu-latest
            release: latest
          - label: latest / Windows
            os: windows-latest
            release: latest
          - label: latest / macOS
            os: macos-latest
            release: latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ matrix.release }}
      - name: Run identity contract lane
        uses: matlab-actions/run-command@v3
        with:
          command: "addpath(genpath('.')); pf2_base.tests.runCI('identity')"
