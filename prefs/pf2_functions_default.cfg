[applyTimeChMask]
Name        = 'Apply Time X Channel Mask'
Description = 'Applies rejection of datapoints which have been masked by other functions\nTypically these are rejected at the end of the processing stage'
Output      = {'x'}
Arguments   = {'x','ftimeChMask'}
validStages = [1,2]

[detrend]
Name        = 'Linear detrending Method'
Description = 'Trend removal using Matlab's detrend function'
validStages = [1,2]
Arguments   = {'x','type'}
Output      = {'x'}
type        = 'linear'

[detrend_nan]
Name        = 'Linear detrending Method (Ignore NaN)'
Description = 'Trend removal ignoring NaN signals'
validStages = [1,2]
Arguments   = {'x','restoreMean'}
Output      = {'x'}
type        = 'linear'
restoreMean = 1

[icaClean]
Name        = 'ICA - Independent Component Analysis Cleaning'
Description = 'Removes Noise based on ICA from second noisy signal'
Output      = {'x'}
validStages = [1,2]
Arguments   = {'x'}

[medfilt1]
Name         = 'Median Filter'
Description  = 'Matlab's 1 Dimensional median filtering method.\napplies an nth-order one-dimensional median filter to x.\nFor NaNcondition use ''includenan'' or ''omitnan'' to specify NaN number handling'
Arguments    = {'x','n','NaNcondition'}
Output       = {'x'}
validStages  = [1,2]
n            = 10
NaNcondition = 'omitnan'

[pf2_CAR]
Name        = 'CAR - Common Average Reference Subtraction'
Description = 'Attempts to remove global signal using mean of all channels'
Output      = {'x'}
validStages = 2
Arguments   = {'x'}

[pf2_Intensity2OD]
Name        = 'Light Intensity to Log Light'
Description = 'Converts data from raw light intensiity into logrithmic domain'
validStages = 1
Output      = {'x'}
Arguments   = {'x'}
Role        = 'intensity2od'

[pf2_MotionCorrectSpline]
Name                    = 'Spline Motion Correction'
Description             = 'Detects motion artifacts using amplitude and derivative thresholds, corrects by fitting a cubic smoothing spline to each artifact segment. Reference: Scholkmann et al. (2010), Physiol. Meas. 31(5), 649-662.'
Arguments               = {'x','fs','p','tMotion','tMask','STDEVthresh','AMPthresh','accelerate'}
Output                  = {'x'}
validStages             = 1
requiresOD              = 1
p                       = 0.99
tMotion                 = 0.5
tMask                   = 1
STDEVthresh             = 20
AMPthresh               = 5
accelerate              = 'auto'
p_type                  = 'double'
p_range                 = [0,1]
p_description           = 'Spline smoothing parameter (1 = strict interpolation, lower = smoother)'
tMotion_type            = 'double'
tMotion_range           = [0,Inf]
tMotion_unit            = 's'
tMotion_description     = 'Motion-segment duration threshold'
tMask_type              = 'double'
tMask_range             = [0,Inf]
tMask_unit              = 's'
tMask_description       = 'Mask extension before/after motion segment'
STDEVthresh_type        = 'double'
STDEVthresh_range       = [0,Inf]
STDEVthresh_description = 'Std-dev multiplier for artifact detection'
AMPthresh_type          = 'double'
AMPthresh_range         = [0,Inf]
AMPthresh_description   = 'Amplitude threshold for artifact detection'
accelerate_type         = 'enum'
accelerate_choices      = {'auto','none','parfor','gpu'}
accelerate_description  = 'Compute backend selection'

[pf2_MotionCorrectSplineSG]
Name        = 'Savitzky-Golay Motion Correction'
Description = 'Detects motion artifacts using amplitude and derivative thresholds, corrects with Savitzky-Golay polynomial filter.\nReference: Scholkmann et al. (2010), Savitzky & Golay (1964).'
Arguments   = {'x','fs','frameSize','polyOrder','tMotion','tMask','STDEVthresh','AMPthresh'}
Output      = {'x'}
validStages = 1
requiresOD  = 1
frameSize   = 11
polyOrder   = 3
tMotion     = 0.5
tMask       = 1
STDEVthresh = 20
AMPthresh   = 5

[pf2_MotionCorrectTDDR]
Name                   = 'Temporal Derivative Distribution Repair'
Description            = 'Corrects motion artifacts by computing the temporal derivative of the dod signal as described in:\nFishburn, F. A. et al. (2019). Temporal Derivative Distribution Repair (TDDR): A motion correction method for fNIRS. NeuroImage, 184, 171-179.'
Arguments              = {'x','fs','accelerate'}
Output                 = {'x'}
validStages            = 1
requiresOD             = 1
accelerate             = 'auto'
Role                   = 'motion'
accelerate_type        = 'enum'
accelerate_choices     = {'auto','none','parfor','gpu'}
accelerate_description = 'Compute backend selection'

[pf2_MotionCorrectWavelet]
Name        = 'Wavelet_Motion_Correction'
Description = 'Perform a wavelet transformation of the dod data and computes the distribution of the wavelet coefficients. It sets the coefficient exceeding iqr times the interquartile range to zero, because these are probably due to motion artifacts. set iqr<0 to skip this function. \nThe algorithm follows in part the procedure described by Molavi et al.,Physiol Meas, 33, 259-270 (2012). \nwavelet selects the wavelet family (default db2). accelerate controls parallel processing.'
Arguments   = {'x','iqr','turnon','wavelet','accelerate'}
Output      = {'x'}
validStages = 1
requiresOD  = 1
iqr         = 1.5
wavelet     = 'db2'
accelerate  = 'auto'

[pf2_SMAR]
Name        = 'SMAR - Sliding Motion Artifact Rejection'
Description = 'Rejection of points based on coefficient of variation\nN = window size in samples\ntauUp = maximum coefficient of variation\ntauLow = minimum coefficient of variation'
Arguments   = {'x','N','tauUp','tauLow'}
Output      = {'x'}
validStages = [1,2]
requiresOD  = 1
N           = 10
tauUp       = 0.025
tauLow      = -1
Role        = 'rejection'

[pf2_SMAR2]
Name        = 'SMAR2 - Sliding Motion Artifact Rejection 2.0'
Description = 'Rejection of points based on coefficient of variation and adaptive thresholding\nN = window size in samples\ntauArtifact = Multiplier for median coeficient of variation used as threshold for artifacts\ntauClean = Multiplier for median of coeficient of variation for clean signal\nminSeg = Minimum number of samples allowed in clean segment'
Arguments   = {'x','N','fChannelNumbers','tauArtifact','tauClean','minSeg'}
Output      = {'x'}
validStages = [1,2]
requiresOD  = 1
N           = 10
tauArtifact = 3
tauClean    = 0
minSeg      = 5

[pf2_SMAR2_mask]
Name        = 'SMAR2 - Sliding Motion Artifact Rejection 2.0 Temporal Masking'
Description = 'Masking of points based on coefficient of variation and adaptive thresholding\nN = window size in samples\ntauArtifact = Multiplier for median coeficient of variation used as threshold for artifacts\ntauClean = Multiplier for median of coeficient of variation for clean signal\n minSeg = Minimum number of samples allowed in "clean" segment'
Arguments   = {'x','N','fChannelNumbers','tauArtifact','tauClean','minSeg'}
Output      = {'ftimeChMask'}
validStages = [1,2]
requiresOD  = 1
N           = 10
tauArtifact = 3
tauClean    = 0
minSeg      = 5

[pf2_SMAR_mask]
Name        = 'SMAR - Sliding Motion Artifact Rejection Temporal Masking'
Description = 'Masking of points based on coefficient of variation\nN = window size in samples\ntauUp = maximum coefficient of variation\ntauLow = minimum coefficient of variation'
Arguments   = {'x','N','tauUp','tauLow'}
Output      = {'ftimeChMask'}
validStages = [1,2]
requiresOD  = 1
N           = 16
tauUp       = 0.015
tauLow      = -1

[pf2_TakizawaRejection]
Name           = 'Takizawa Rejection'
Description    = 'Takizawa Rejection'
Arguments      = {'fNIRstruct','strictCriteria'}
Output         = {'fchMask'}
validStages    = 2
strictCriteria = 1

[pf2_ambient_ICA_clean]
Name        = 'Ambient ICA Clean'
Description = 'Uses ICA/PCA to remove light contribution from ambient/dark channel'
Arguments   = {'x','fAmbient','fChannelNumbers','icaWeight'}
Output      = {'x'}
validStages = 1
icaWeight   = 0

[pf2_bandstop]
Name        = 'Bandstop Filter'
Description = 'pf2_bandstop function designs bandstop butterworth filter with the specified cut-off frequencies and order.\nUses Matlabs designfilt function'
validStages = [1,2]
Arguments   = {'x','filtOrder','fs','lowF','highF'}
Output      = {'x'}
filtOrder   = 4
lowF        = 0.04
highF       = 0.06

[pf2_bpf_butter]
Name        = 'Butterworth Band Pass Filter'
Description = 'bpf function designs bandpass butterworth filter with the specified cut-off frequencies and order.'
Arguments   = {'x','filtOrder','fs','lowF','highF','restoreMean'}
Output      = {'x'}
validStages = [1,2]
filtOrder   = 3
lowF        = 0.008
highF       = 0.1
restoreMean = 0

[pf2_bpf_fir]
Name        = 'Finite-Impulse Response Band Pass Filter'
Description = 'bpf function designs lowpass FIR filter with the specified cut-off frequencies and length.'
Arguments   = {'x','fs','lowF','highF','Nf','restoreMean'}
Output      = {'x'}
validStages = [1,2]
Nf          = 200
lowF        = 0.008
highF       = 0.1
restoreMean = 0

[pf2_build_nanmean_ROI]
Name            = 'Build nanmean ROI'
Description     = 'BuildROI from ROI.info table using nanmean of channels'
Arguments       = {'fNIRstruct','ComponentNumber'}
Output          = {'ROI'}
validStages     = 2
ComponentNumber = 1

[pf2_build_pca_ROI]
Name            = 'Build PCA ROI'
Description     = 'Build ROIs  from ROI.info table using provided PCA component number'
Arguments       = {'fNIRstruct','ComponentNumber'}
Output          = {'ROI'}
validStages     = 2
ComponentNumber = 1

[pf2_fnirs_MARA]
Name        = 'MARA - Motion Artifact Reduction Algorithim'
Description = 'Spline based reconstruction using moving standard deviation.\nMovement artifact removal algorithm (MARA) presented in Scholkmann et al. (2010)\nT = threshold for artifact reduction\nL=one sided window (w=2L+1)\nalpha = loess smoothing paramater'
Arguments   = {'x','fs','T','L','alpha'}
Output      = {'x'}
validStages = 1
requiresOD  = 1
T           = 25
L           = 50
alpha       = 4

[pf2_hpf]
Name        = 'High Pass Filter'
Description = 'High Pass Filter\nUse ft = 1 to generate an FIR1 filter with a linear phase\nUse ft=3 to generate a Butterworth filter\nfs should match your device sampling frequency\nfreq_cut is the frequency cutoff in Hz\nNf is the filter length'
Arguments   = {'x','filtType','fs','freq_cut','Nf'}
Output      = {'x'}
validStages = [1,2]
filtType    = 1
freq_cut    = 0.008
Nf          = 200

[pf2_kbWF]
Name        = 'Kurtosis-based Wavelet Algorithm'
Description = 'kbWF algorithm removes movement artifacts from fNIRS data by applying kbWF algorithm\nwavelet selects the wavelet family (default db6). accelerate controls parallel processing.'
Arguments   = {'x','kurtosis','minlvl','wavelet','accelerate'}
Output      = {'x'}
validStages = 1
requiresOD  = 1
kurtosis    = 3.3
minlvl      = 3
wavelet     = 'db6'
accelerate  = 'auto'

[pf2_lpf]
Name                 = 'Low Pass Filter'
Description          = 'Low Pass Filter. Use ft 1 for FIR1 (linear phase), 2 for Parks-McClellan (linear phase), 3 for Butterworth. fs should match your device sampling frequency; freq_cut is in Hz; Nf is the filter length.'
Arguments            = {'x','filtType','fs','freq_cut','Nf'}
Output               = {'x'}
validStages          = [1,2]
filtType             = 1
freq_cut             = 0.1
Nf                   = 50
Role                 = 'filter'
filtType_type        = 'enum'
filtType_choices     = {1,2,3}
filtType_description = 'Filter design: 1=FIR1, 2=Parks-McClellan, 3=Butterworth'
freq_cut_type        = 'double'
freq_cut_range       = [0,Inf]
freq_cut_unit        = 'Hz'
freq_cut_description = 'Cutoff frequency (must be < fs/2)'
Nf_type              = 'int'
Nf_range             = [1,1000]
Nf_unit              = 'samples'
Nf_description       = 'Filter length (number of taps)'

[pf2_sSMART]
Name        = 'statistical Sliding Motion Artifact Reconstruction Technique : sSMART (beta)'
Description = 'Uses adaptive coefficient of variation thresholding and sgolay filtering to reconstruct original signal'
validStages = [1,2]
requiresOD  = 1
Arguments   = {'x','fs','fChannelNumbers','tauArtifact','tauClean','minSeg','SGdegree'}
Output      = {'x'}
tauArtifact = 3
tauClean    = 0
minSeg      = 5
SGdegree    = 2

[pf2_subtractAmbient]
Name        = 'Subtract Ambient'
Description = 'Subtracts ambient light intensity from measured RAW light intensity'
Arguments   = {'x','fAmbient','fChannelNumbers'}
Output      = {'x'}
validStages = 1

[pf2_thresholdValues]
Name        = 'Threshold Values'
Description = 'Function which replaces values above and below set parameters with NaN'
validStages = [1,2]
Arguments   = {'x','max','min'}
Output      = {'x'}
max         = 4200
min         = 0

[pf2_thresholdValues_mask]
Name        = 'Threshold Values Mask'
Description = 'Function which masks values above and below set parameters. These values are rejected at the end of the processing stage or when applyTimeChMask is run'
validStages = [1,2]
Arguments   = {'x','max','min'}
Output      = {'ftimeChMask'}
max         = 4200
min         = 0

[waveClean]
Name        = 'Wavelet-Based Denoising'
Description = 'Wavelet-based cleaning method\nLevel is the wavelet level that is denoised. Alpha determines the sigma threshold for removal\nwavelet selects the wavelet family (default db10). accelerate controls parallel processing.'
validStages = [1,2]
Arguments   = {'x','level','alpha','convert2OD','showPlot','wavelet','accelerate'}
Output      = {'x'}
level       = 6
alpha       = 0.1
wavelet     = 'db10'
accelerate  = 'auto'

